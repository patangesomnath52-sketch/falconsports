<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>FalconSports | Product Detail</title>
  <meta name="description" content="FalconSports – Premium sportswear product detail. Read and write reviews for this item.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="icon" type="image/png" href="falcon-symbol.png">
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --bg: #ffffff;
      --text: #0a0a0a;
      --surface: #f8f8f8;
      --border: #e5e5e5;
      --accent: #d32f2f;
      --accent-hover: #b71c1c;
      --gold: #c9a84c;
      --header-bg: rgba(255,255,255,0.85);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
      --shadow-md: 0 8px 25px rgba(0,0,0,0.06);
      --card-bg: #ffffff;
      --btn-bg: #0a0a0a;
      --btn-text: #ffffff;
      --star-color: #f59e0b;
    }
    body.dark {
      --bg: #0a0a0a;
      --text: #f0f0f0;
      --surface: #141414;
      --border: #2a2a2a;
      --header-bg: rgba(10,10,10,0.85);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
      --shadow-md: 0 8px 25px rgba(0,0,0,0.5);
      --card-bg: #1a1a1a;
      --btn-bg: #f0f0f0;
      --btn-text: #0a0a0a;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.4s, color 0.4s;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width:1280px; margin:0 auto; padding:0 28px; }

    header {
      position: sticky; top:0; z-index:60;
      background: var(--header-bg); backdrop-filter: blur(20px);
      border-bottom:1px solid var(--border);
    }
    .navbar { display:flex; align-items:center; justify-content:space-between; padding:12px 0; }
    .logo { display:flex; align-items:center; text-decoration:none; }
    .nav-logo { height:32px; transition:filter 0.3s; filter:brightness(0) invert(0); }
    body.dark .nav-logo { filter:brightness(0) invert(1); }
    .nav-links { display:flex; gap:24px; font-weight:600; font-size:0.85rem; text-transform:uppercase; letter-spacing:1px; }
    .nav-links a { text-decoration:none; color:var(--text); transition:0.2s; padding:4px 0; }
    .nav-links a:hover { color:var(--accent); }
    .header-actions { display:flex; gap:18px; align-items:center; }
    .header-actions i { font-size:1.3rem; cursor:pointer; color:var(--text); transition:0.2s; }
    .header-actions i:hover { color:var(--accent); }
    .theme-btn { background:none; border:none; font-size:1.3rem; cursor:pointer; color:var(--text); }
    @media (max-width:900px) { .nav-links { display:none; } }

    /* Product Detail Layout */
    .product-hero {
      display: flex; gap:50px; flex-wrap:wrap; margin:40px 0;
    }
    .gallery { flex:1.2; min-width:320px; }
    .main-image-wrap {
      border-radius:20px; overflow:hidden; background:var(--surface);
      box-shadow:var(--shadow-md); position:relative; cursor:zoom-in;
    }
    .main-image { width:100%; display:block; transition:transform 0.4s; }
    .main-image-wrap:hover .main-image { transform:scale(1.02); }
    .thumbnails { display:flex; gap:10px; margin-top:18px; }
    .thumb {
      width:80px; height:80px; object-fit:cover; border-radius:12px;
      cursor:pointer; border:2px solid transparent; transition:0.2s; opacity:0.8;
    }
    .thumb.active, .thumb:hover { border-color:var(--accent); opacity:1; }

    .product-info { flex:0.95; }
    .brand-tag {
      text-transform:uppercase; letter-spacing:2px; font-weight:700;
      color:var(--accent); font-size:0.8rem; margin-bottom:8px;
    }
    .product-title { font-size:2.2rem; font-weight:800; margin-bottom:8px; }
    .rating-stars { color:var(--star-color); font-size:1.1rem; margin-bottom:16px; }
    .price-section { margin-bottom:20px; }
    .current-price { font-size:2rem; font-weight:800; color:var(--accent); }
    .original-price { text-decoration:line-through; color:#999; margin-left:10px; font-size:1.1rem; }
    .description { margin-bottom:24px; opacity:0.85; }

    /* Colors & Sizes */
    .color-label, .size-label { font-weight:600; margin-bottom:8px; display:block; }
    .color-options { display:flex; gap:12px; margin-bottom:24px; }
    .color-swatch {
      width:38px; height:38px; border-radius:50%; cursor:pointer; border:2px solid #ccc; transition:0.2s;
    }
    .color-swatch.active { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent); }
    .size-options { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px; }
    .size-btn {
      padding:12px 20px; border:1px solid var(--border); border-radius:10px;
      cursor:pointer; font-weight:600; transition:0.2s; background:var(--surface); color:var(--text);
    }
    .size-btn.selected { background:var(--accent); color:white; border-color:var(--accent); }
    .size-btn.out-of-stock { opacity:0.4; pointer-events:none; text-decoration:line-through; }
    .stock-message { font-size:0.9rem; margin-bottom:16px; font-weight:600; }

    .qty-wrap { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
    .qty-btn { width:44px; height:44px; border:1px solid var(--border); background:var(--surface); border-radius:10px; font-size:1.2rem; cursor:pointer; color:var(--text); }
    .qty-input { width:70px; text-align:center; border:1px solid var(--border); border-radius:10px; padding:10px; background:var(--bg); color:var(--text); font-weight:600; }

    .action-btns { display:flex; flex-direction:column; gap:12px; margin-bottom:28px; }
    .btn {
      padding:16px 24px; font-weight:700; text-transform:uppercase; letter-spacing:1px;
      border:none; border-radius:12px; cursor:pointer; transition:all 0.3s;
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      font-size:0.9rem; width:100%;
    }
    .btn-primary { background:var(--accent); color:white; }
    .btn-primary:hover { background:var(--accent-hover); transform:translateY(-2px); }
    .btn-secondary { background:transparent; border:2px solid var(--text); color:var(--text); }
    .btn-secondary:hover { background:var(--text); color:var(--bg); }

    .delivery-box { background:var(--surface); border-radius:14px; padding:18px; margin-bottom:24px; }
    .pincode-input { width:150px; padding:10px; border:1px solid var(--border); border-radius:8px; background:var(--bg); color:var(--text); }

    /* Review Section */
    .review-section { margin-top:50px; }
    .section-title { font-size:2rem; font-weight:800; margin:30px 0 20px; }
    .write-review-card {
      background:var(--surface); border-radius:20px; padding:30px; margin-bottom:30px;
      box-shadow:var(--shadow-sm);
    }
    .star-input { display:flex; gap:4px; font-size:2rem; cursor:pointer; margin:10px 0; }
    .star-input i { color:#ccc; transition:0.2s; }
    .star-input i.active, .star-input i.hover { color:var(--star-color); }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    @media (max-width:600px) { .form-grid { grid-template-columns:1fr; } }
    .form-group { margin-bottom:16px; }
    .form-group label { display:block; font-weight:600; margin-bottom:6px; }
    .form-group input, .form-group textarea {
      width:100%; padding:12px; border:1px solid var(--border); border-radius:8px;
      background:var(--bg); color:var(--text); font-family:inherit;
    }
    .photo-upload { margin-top:12px; }
    .photo-preview { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
    .photo-preview img { width:80px; height:80px; object-fit:cover; border-radius:8px; }

    .review-card {
      background:var(--card-bg); border-radius:16px; padding:24px;
      border:1px solid var(--border); margin-bottom:20px; box-shadow:var(--shadow-sm);
    }
    .review-header { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; }
    .verified-badge {
      background:#e8f5e9; color:#22c55e; padding:4px 10px; border-radius:20px;
      font-size:0.75rem; font-weight:600; display:inline-flex; align-items:center; gap:4px;
    }
    body.dark .verified-badge { background:#1a3a1a; }
    .review-photos { display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; }
    .review-photos img { width:80px; height:80px; object-fit:cover; border-radius:8px; cursor:pointer; }

    footer { background:#111; color:#bbb; padding:40px 0 30px; margin-top:60px; text-align:center; }
    body.dark footer { background:#000; }
    .footer-logo { height:50px; filter:invert(1); }

    .notification {
      position:fixed; top:20px; right:20px; background:var(--accent); color:white;
      padding:16px 28px; border-radius:12px; z-index:1000; font-weight:600;
      display:none; animation:slideIn 0.3s ease;
    }
    @keyframes slideIn { from{transform:translateX(120%);opacity:0;} to{transform:translateX(0);opacity:1;} }
    img { max-width:100%; height:auto; }
video { max-width:100%; height:auto; }
  </style>
</head>
<body>
  <header>
    <div class="container navbar">
      <a href="index.html" class="logo"><img src="falcon-horizontal.png" alt="FalconSports" class="nav-logo"></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="collection.html">Collection</a>
        <a href="shoes.html">Shoes</a>
        <a href="kitbuilder.html">Kit Builder</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <div class="header-actions">
        <i class="fas fa-search"></i>
        <i class="fas fa-shopping-bag" onclick="window.location.href='index.html#cart'"></i>
        <button class="theme-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
      </div>
    </div>
  </header>

  <div id="notification" class="notification"></div>

  <div class="container" id="productDetailContainer">
    <!-- dynamically filled -->
  </div>

  <footer>
    <div class="container" style="display:flex; flex-direction:column; align-items:center; gap:20px;">
      <img src="falcon-stacked.png" alt="FalconSports" class="footer-logo">
      <div>© 2026 FalconSports. Premium Sportswear.</div>
    </div>
  </footer>

  <script>
    (() => {
      // Theme
      const body = document.body;
      const themeToggle = document.getElementById('themeToggle');
      const themeIcon = themeToggle.querySelector('i');
      if (localStorage.getItem('falconSportsTheme') === 'dark') {
        body.classList.add('dark'); themeIcon.className = 'fas fa-sun';
      }
      themeToggle.addEventListener('click', () => {
        body.classList.toggle('dark');
        const isDark = body.classList.contains('dark');
        themeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        localStorage.setItem('falconSportsTheme', isDark ? 'dark' : 'light');
      });

      const params = new URLSearchParams(window.location.search);
      const productId = params.get('id');
      const allProducts = JSON.parse(localStorage.getItem('falconProducts')) || [];
      const product = allProducts.find(p => p.id == productId);

      if (!product) {
        document.getElementById('productDetailContainer').innerHTML = '<h2>Product not found.</h2><a href="index.html">Back to Home</a>';
        return;
      }

      let selectedImageIndex = 0;
      let selectedSize = null;
      let quantity = 1;
      let cart = JSON.parse(localStorage.getItem('falconCart')) || [];
      let kitItems = JSON.parse(localStorage.getItem('falconKit')) || [];
      let reviews = JSON.parse(localStorage.getItem('falconReviews')) || [];
      let selectedRating = 0;
      const uploadedPhotos = [];

      function saveCart() { localStorage.setItem('falconCart', JSON.stringify(cart)); }
      function saveKit() { localStorage.setItem('falconKit', JSON.stringify(kitItems)); }

      const images = product.images?.length ? product.images : ['https://placehold.co/800x800/1a1a1a/white?text=Falcon'];
      const sizes = product.sizes || [];
      const price = product.salePrice || product.price;
      const originalPrice = product.salePrice ? product.price : null;

      function renderProduct() {
        const container = document.getElementById('productDetailContainer');
        const colors = ['Black','White','Navy'];
        const sizesHTML = sizes.map(s => {
          const stock = s.stock;
          let cls = 'size-btn';
          if (selectedSize === s.size) cls += ' selected';
          if (stock === 0) cls += ' out-of-stock';
          return `<button class="${cls}" data-size="${s.size}" onclick="selectSize('${s.size}', ${stock})">${s.size}</button>`;
        }).join('');

        const selectedSizeObj = sizes.find(s => s.size === selectedSize);
        const stockInfo = selectedSizeObj ? (selectedSizeObj.stock === 0 ? 'Out of Stock' : (selectedSizeObj.stock <= 3 ? `Only ${selectedSizeObj.stock} left` : 'In Stock')) : 'Select a size';

        // Product reviews for this product
        const productReviews = reviews.filter(r => r.productId == product.id && r.approved !== false);
        const avgRating = productReviews.length ? (productReviews.reduce((s,r) => s + r.rating, 0) / productReviews.length).toFixed(1) : 0;
        const starDisplay = avgRating > 0 ? '★'.repeat(Math.round(avgRating)) + '☆'.repeat(5 - Math.round(avgRating)) : '☆☆☆☆☆';

        const reviewListHTML = productReviews.map(r => `
          <div class="review-card">
            <div class="review-header">
              <div>
                <strong>${r.name}</strong>
                <span style="color:var(--star-color); margin-left:10px;">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
                ${r.verified ? '<span class="verified-badge"><i class="fas fa-check-circle"></i> Verified Purchase</span>' : ''}
              </div>
              <small>${r.createdAt}</small>
            </div>
            ${r.title ? `<h4 style="margin:8px 0;">${r.title}</h4>` : ''}
            <p>${r.text}</p>
            ${r.photos && r.photos.length ? `<div class="review-photos">${r.photos.map(p => `<img src="${p}" alt="review">`).join('')}</div>` : ''}
          </div>
        `).join('');

        container.innerHTML = `
          <div class="product-hero">
            <div class="gallery">
              <div class="main-image-wrap" onclick="openFullscreen()">
                <img src="${images[selectedImageIndex]}" class="main-image" id="mainImage" alt="${product.name}">
              </div>
              <div class="thumbnails">
                ${images.map((img, i) => `<img src="${img}" class="thumb ${i===selectedImageIndex?'active':''}" onclick="switchImage(${i})">`).join('')}
              </div>
            </div>
            <div class="product-info">
              <div class="brand-tag">FalconSports</div>
              <h1 class="product-title">${product.name}</h1>
              <div class="rating-stars">${starDisplay} ${avgRating} (${productReviews.length} reviews)</div>
              <div class="price-section">
                <span class="current-price">₹${price}</span>
                ${originalPrice ? `<span class="original-price">₹${originalPrice}</span>` : ''}
              </div>
              <p class="description">${product.description || 'Engineered for peak performance.'}</p>

              <span class="color-label">Color</span>
              <div class="color-options">
                ${colors.map((c,i) => `<div class="color-swatch ${i===selectedImageIndex?'active':''}" style="background:${c==='Black'?'#000':c==='White'?'#fff':'#0057b7'};" onclick="switchImage(${i})"></div>`).join('')}
              </div>

              <span class="size-label">Size</span>
              <div class="size-options">${sizesHTML}</div>
              <div class="stock-message" style="color:${selectedSizeObj?.stock===0?'red':'inherit'}">${stockInfo}</div>

              <div class="qty-wrap">
                <button class="qty-btn" onclick="changeQty(-1)">−</button>
                <input type="number" class="qty-input" id="qtyInput" value="1" min="1" readonly>
                <button class="qty-btn" onclick="changeQty(1)">+</button>
              </div>

              <div class="action-btns">
                <button class="btn btn-primary" onclick="addToCartFromDetail()"><i class="fas fa-shopping-bag"></i> ADD TO CART</button>
                <button class="btn btn-secondary" onclick="addToKitFromDetail()"><i class="fas fa-cube"></i> ADD TO KIT BUILDER</button>
              </div>

              <div class="delivery-box">
                <input type="text" placeholder="Enter Pincode" class="pincode-input">
                <div style="margin-top:10px; font-size:0.9rem;">✓ Free Delivery · Cash on Delivery</div>
              </div>
            </div>
          </div>

          <!-- Review Section -->
          <div class="review-section">
            <h2 class="section-title">Customer Reviews</h2>
            <div class="write-review-card">
              <h3 style="margin-bottom:16px;">Write a Review for ${product.name}</h3>
              <div class="star-input" id="starInput">
                ${[1,2,3,4,5].map(n => `<i class="far fa-star" data-value="${n}"></i>`).join('')}
              </div>
              <div class="form-grid">
                <div class="form-group"><label>Name</label><input type="text" id="reviewName"></div>
                <div class="form-group"><label>Email</label><input type="email" id="reviewEmail"></div>
              </div>
              <div class="form-group"><label>Review Title</label><input type="text" id="reviewTitle"></div>
              <div class="form-group"><label>Your Review</label><textarea id="reviewText" rows="4"></textarea></div>
              <div class="photo-upload">
                <label>Add Photos (max 5)</label>
                <input type="file" id="photoInput" accept="image/*" multiple onchange="previewReviewPhotos()">
                <div class="photo-preview" id="photoPreview"></div>
              </div>
              <button class="btn btn-primary" style="width:auto; margin-top:16px;" onclick="submitProductReview()">SUBMIT REVIEW</button>
              <p style="font-size:0.8rem; margin-top:8px; opacity:0.7;">Review will be published after approval.</p>
            </div>

            <div id="productReviewsList">
              ${reviewListHTML || '<p>No reviews yet. Be the first to review!</p>'}
            </div>
          </div>
        `;

        // Reattach star rating events
        attachStarEvents();
      }

      function attachStarEvents() {
        const stars = document.querySelectorAll('#starInput i');
        stars.forEach(star => {
          star.addEventListener('click', function() {
            selectedRating = parseInt(this.dataset.value);
            updateStarDisplay(selectedRating);
          });
          star.addEventListener('mouseenter', function() {
            const val = parseInt(this.dataset.value);
            stars.forEach((s, i) => s.className = i < val ? 'fas fa-star active' : 'far fa-star');
          });
          star.addEventListener('mouseleave', function() {
            updateStarDisplay(selectedRating);
          });
        });
      }

      function updateStarDisplay(rating) {
        const stars = document.querySelectorAll('#starInput i');
        stars.forEach((s, i) => s.className = i < rating ? 'fas fa-star active' : 'far fa-star');
      }

      window.previewReviewPhotos = function() {
        const files = document.getElementById('photoInput').files;
        const preview = document.getElementById('photoPreview');
        uploadedPhotos.length = 0;
        preview.innerHTML = '';
        for (let file of files) {
          if (uploadedPhotos.length >= 5) break;
          const reader = new FileReader();
          reader.onload = (e) => {
            uploadedPhotos.push(e.target.result);
            const img = document.createElement('img');
            img.src = e.target.result;
            preview.appendChild(img);
          };
          reader.readAsDataURL(file);
        }
      };

      window.submitProductReview = function() {
        const name = document.getElementById('reviewName').value.trim();
        const email = document.getElementById('reviewEmail').value.trim();
        const title = document.getElementById('reviewTitle').value.trim();
        const text = document.getElementById('reviewText').value.trim();
        if (!name || !text || selectedRating === 0) {
          showNotification('Please fill all required fields and select a rating.');
          return;
        }
        const newReview = {
          id: Date.now(),
          productId: product.id,
          productName: product.name,
          name,
          email,
          rating: selectedRating,
          title,
          text,
          verified: false,
          photos: uploadedPhotos.slice(),
          approved: false,
          createdAt: new Date().toISOString().split('T')[0],
          helpful: 0,
          notHelpful: 0
        };
        reviews.unshift(newReview);
        localStorage.setItem('falconReviews', JSON.stringify(reviews));
        showNotification('Review submitted for approval!');
        // Reset form
        selectedRating = 0;
        updateStarDisplay(0);
        document.getElementById('reviewName').value = '';
        document.getElementById('reviewEmail').value = '';
        document.getElementById('reviewTitle').value = '';
        document.getElementById('reviewText').value = '';
        uploadedPhotos.length = 0;
        document.getElementById('photoPreview').innerHTML = '';
        document.getElementById('photoInput').value = '';
        renderProduct();
      };

      window.switchImage = (index) => {
        selectedImageIndex = index;
        document.getElementById('mainImage').src = images[index];
        document.querySelectorAll('.thumb').forEach((t,i) => t.classList.toggle('active', i===index));
        document.querySelectorAll('.color-swatch').forEach((c,i) => c.classList.toggle('active', i===index));
      };
      window.selectSize = (size, stock) => {
        if (stock <= 0) return;
        selectedSize = size;
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
        document.querySelector(`.size-btn[data-size="${size}"]`)?.classList.add('selected');
        const msg = document.querySelector('.stock-message');
        if (msg) {
          const sObj = sizes.find(s => s.size === size);
          msg.textContent = sObj ? (sObj.stock === 0 ? 'Out of Stock' : (sObj.stock <= 3 ? `Only ${sObj.stock} left` : 'In Stock')) : '';
          msg.style.color = sObj?.stock === 0 ? 'red' : 'inherit';
        }
      };
      window.changeQty = (delta) => {
        const input = document.getElementById('qtyInput');
        let val = parseInt(input.value) + delta;
        if (val < 1) val = 1;
        input.value = val;
        quantity = val;
      };
      window.addToCartFromDetail = () => {
        if (!selectedSize) return showNotification('Please select a size');
        cart.push({ name: product.name, price, size: selectedSize, qty: quantity, id: Date.now() });
        saveCart();
        showNotification('Added to cart!');
      };
      window.addToKitFromDetail = () => {
        let type = 'general';
        const cat = product.category?.toLowerCase() || '';
        if (cat.includes('t-shirt') || cat.includes('tee')) type = 'tshirt';
        else if (cat.includes('pant') || cat.includes('short')) type = 'bottom';
        else if (cat.includes('shoe')) type = 'shoes';
        kitItems = kitItems.filter(i => i.type !== type);
        kitItems.push({ name: product.name, price, type, id: Date.now() });
        saveKit();
        showNotification('Added to kit!');
      };

      function showNotification(msg) {
        const n = document.getElementById('notification');
        n.textContent = msg; n.style.display = 'block';
        setTimeout(() => n.style.display = 'none', 3000);
      }

      renderProduct();
    })();
  </script>
