<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>FalconSports Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#0f172a; color:#e2e8f0; display:flex; height:100vh; overflow:hidden; }
    .sidebar { width:260px; background:#1e293b; border-right:1px solid #334155; display:flex; flex-direction:column; }
    .sidebar-logo { padding:24px 20px; font-weight:800; font-size:1.4rem; letter-spacing:-1px; color:#f8fafc; border-bottom:1px solid #334155; }
    .sidebar-logo i { color:#ef4444; margin-right:8px; }
    .nav { flex:1; overflow-y:auto; padding:16px 0; }
    .nav-item { display:flex; align-items:center; gap:12px; padding:12px 20px; color:#94a3b8; font-weight:500; cursor:pointer; transition:0.2s; font-size:0.9rem; }
    .nav-item:hover, .nav-item.active { background:#334155; color:#f1f5f9; }
    .nav-item i { width:20px; text-align:center; }
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .topbar { padding:16px 24px; background:#1e293b; border-bottom:1px solid #334155; display:flex; justify-content:flex-end; align-items:center; gap:16px; }
    .content { flex:1; overflow-y:auto; padding:24px; }
    .card { background:#1e293b; border-radius:12px; padding:20px; margin-bottom:24px; border:1px solid #334155; }
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:16px; margin-bottom:24px; }
    .stat-card { background:#1e293b; border-radius:12px; padding:20px; border:1px solid #334155; }
    .stat-value { font-size:2rem; font-weight:700; }
    .stat-label { color:#94a3b8; font-size:0.85rem; }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; padding:12px; border-bottom:1px solid #334155; }
    th { color:#94a3b8; font-weight:600; font-size:0.8rem; text-transform:uppercase; }
    .btn { padding:8px 16px; border-radius:6px; font-weight:600; cursor:pointer; border:none; transition:0.2s; display:inline-flex; align-items:center; gap:6px; font-size:0.85rem; }
    .btn-primary { background:#ef4444; color:white; }
    .btn-outline { background:transparent; border:1px solid #94a3b8; color:#e2e8f0; }
    .btn-sm { padding:4px 10px; font-size:0.8rem; }
    .badge { padding:4px 8px; border-radius:20px; font-size:0.75rem; font-weight:600; }
    .badge-success { background:#16a34a20; color:#22c55e; }
    .badge-warning { background:#f59e0b20; color:#fbbf24; }
    .badge-danger { background:#ef444420; color:#f87171; }
    .badge-info { background:#3b82f620; color:#60a5fa; }
    input, select, textarea { background:#0f172a; border:1px solid #334155; color:#e2e8f0; padding:8px 12px; border-radius:6px; width:100%; margin:8px 0; font-family:inherit; }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .flex { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    .modal { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:1000; }
    .modal-content { background:#1e293b; border-radius:12px; padding:24px; width:90%; max-width:700px; max-height:80vh; overflow-y:auto; position:relative; }
    .close-btn { position:absolute; top:12px; right:12px; background:none; border:none; color:#94a3b8; font-size:1.5rem; cursor:pointer; }
    .hidden { display:none !important; }
    .size-row { display:flex; gap:8px; align-items:center; margin:4px 0; }
    .size-row input { width:80px; }
    img.preview { max-width:100px; max-height:100px; object-fit:cover; border-radius:8px; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-logo"><i class="fas fa-feather-alt"></i>FalconAdmin</div>
    <div class="nav" id="nav">
      <div class="nav-item active" data-page="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</div>
      <div class="nav-item" data-page="messages"><i class="fas fa-envelope"></i> Contact Messages</div>
      <div class="nav-item" data-page="products"><i class="fas fa-box"></i> Products</div>
      <div class="nav-item" data-page="categories"><i class="fas fa-tags"></i> Categories</div>
      <div class="nav-item" data-page="shoes"><i class="fas fa-shoe-prints"></i> Shoes</div>
      <div class="nav-item" data-page="kitbuilder"><i class="fas fa-puzzle-piece"></i> Kit Builder</div>
      <div class="nav-item" data-page="orders"><i class="fas fa-shopping-cart"></i> Orders</div>
      <div class="nav-item" data-page="customers"><i class="fas fa-users"></i> Customers</div>
      <div class="nav-item" data-page="coupons"><i class="fas fa-ticket-alt"></i> Coupons</div>
      <div class="nav-item" data-page="reviews"><i class="fas fa-star"></i> Reviews</div>
      <div class="nav-item" data-page="content"><i class="fas fa-file-alt"></i> Website Content</div>
      <div class="nav-item" data-page="media"><i class="fas fa-images"></i> Media Library</div>
      <div class="nav-item" data-page="settings"><i class="fas fa-cog"></i> Settings</div>
      <div class="nav-item" data-page="analytics"><i class="fas fa-chart-bar"></i> Analytics</div>
    </div>
  </div>
  <div class="main">
    <div class="topbar"><span>Welcome, Admin</span><i class="fas fa-user-circle fa-lg"></i></div>
    <div class="content" id="contentArea"></div>
  </div>

  <div id="modal" class="modal hidden"><div class="modal-content" id="modalContent"></div></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    // ---------- CONFIG ----------
    const API_URL = 'http://localhost:5000/api';

    // ---------- LOCAL STORAGE HELPERS ----------
    function getLocal(key, fallback) { return JSON.parse(localStorage.getItem(key)) || fallback; }
    function setLocal(key, data) { localStorage.setItem(key, JSON.stringify(data)); }

    // ---------- IMAGE COMPRESSION ----------
    function compressImage(file, maxWidth = 800, quality = 0.6) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = new Image();
          img.onload = function() {
            const canvas = document.createElement('canvas');
            let width = img.width, height = img.height;
            if (width > maxWidth) { height = (maxWidth / width) * height; width = maxWidth; }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    // ---------- API HELPERS ----------
    async function fetchProducts() { const res = await fetch(`${API_URL}/products`); return res.json(); }
    async function saveProductToDB(productData, id = null) {
      if (id) {
        const res = await fetch(`${API_URL}/products/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(productData) });
        return res.json();
      } else {
        const res = await fetch(`${API_URL}/products`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(productData) });
        return res.json();
      }
    }
    async function deleteProductFromDB(id) { await fetch(`${API_URL}/products/${id}`, { method: 'DELETE' }); }

    // ---------- NAVIGATION ----------
    let currentPage = 'dashboard';
    const contentArea = document.getElementById('contentArea');
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', function() {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        this.classList.add('active');
        currentPage = this.dataset.page;
        renderPage();
      });
    });

    function renderPage() {
      switch(currentPage) {
        case 'dashboard': renderDashboard(); break;
        case 'messages': renderMessages(); break;   // ← FIXED: added this line
        case 'products': renderProducts(); break;
        case 'categories': renderCategories(); break;
        case 'shoes': renderShoes(); break;
        case 'kitbuilder': renderKitBuilder(); break;
        case 'orders': renderOrders(); break;
        case 'customers': renderCustomers(); break;
        case 'coupons': renderCoupons(); break;
        case 'reviews': renderReviews(); break;
        case 'content': renderContent(); break;
        case 'media': renderMedia(); break;
        case 'settings': renderSettings(); break;
        case 'analytics': renderAnalytics(); break;
      }
    }

    // ---------- DASHBOARD ----------
    async function renderDashboard() {
      const products = await fetchProducts();
      const orders = await fetch(`${API_URL}/orders`).then(res => res.json()).catch(() => []);
      const totalProducts = products.length;
      const totalOrders = orders.length;
      const revenue = orders.reduce((sum, o) => sum + (o.grandTotal || 0), 0);
      const outOfStock = products.filter(p => p.sizes && p.sizes.every(s => s.stock === 0)).length;
      const lowStock = products.filter(p => p.sizes && p.sizes.some(s => s.stock > 0 && s.stock <= 5)).length;
      contentArea.innerHTML = `
        <h2>Dashboard</h2>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-value">${totalProducts}</div><div class="stat-label">Total Products</div></div>
          <div class="stat-card"><div class="stat-value">${totalOrders}</div><div class="stat-label">Total Orders</div></div>
          <div class="stat-card"><div class="stat-value">₹${revenue}</div><div class="stat-label">Revenue</div></div>
          <div class="stat-card"><div class="stat-value">${outOfStock}</div><div class="stat-label">Out Of Stock</div></div>
          <div class="stat-card"><div class="stat-value">${lowStock}</div><div class="stat-label">Low Stock</div></div>
        </div>
      `;
    }

    // ---------- CONTACT MESSAGES ----------
    async function renderMessages() {
      const messages = await fetch(`${API_URL}/contact`).then(res => res.json()).catch(() => []);
      contentArea.innerHTML = `
        <h2>Contact Messages</h2>
        <table>
          <thead><tr><th>Date</th><th>Name</th><th>Email</th><th>Subject</th><th>Message</th></tr></thead>
          <tbody>
            ${messages.map(m => `
              <tr>
                <td>${new Date(m.createdAt).toLocaleString()}</td>
                <td>${m.name}</td>
                <td>${m.email}</td>
                <td>${m.subject || '-'}</td>
                <td>${m.message}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        ${messages.length === 0 ? '<p>No messages yet.</p>' : ''}
      `;
    }

    // ---------- PRODUCTS (same as before) ----------
    async function renderProducts(filterCat = 'all', searchTerm = '') {
      const products = await fetchProducts();
      let filtered = products;
      if (filterCat !== 'all') filtered = filtered.filter(p => p.category === filterCat);
      if (searchTerm) filtered = filtered.filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase()) || (p.sku || '').toLowerCase().includes(searchTerm.toLowerCase()));

      contentArea.innerHTML = `
        <h2>Products</h2>
        <div class="flex" style="justify-content:space-between; margin-bottom:16px;">
          <div class="flex">
            <input type="text" placeholder="Search products..." id="productSearch" value="${searchTerm}" oninput="renderProducts(document.getElementById('productFilter').value, this.value)" style="width:200px;">
            <select id="productFilter" onchange="renderProducts(this.value, document.getElementById('productSearch').value)">
              <option value="all">All Categories</option>
              ${[...new Set(products.map(p => p.category).filter(Boolean))].map(c => `<option value="${c}" ${filterCat===c?'selected':''}>${c}</option>`).join('')}
            </select>
          </div>
          <button class="btn btn-primary" onclick="openProductModal()"><i class="fas fa-plus"></i> Add Product</button>
        </div>
        <table>
          <thead><tr><th>Image</th><th>Name</th><th>SKU</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th><th>Kit Builder</th><th>Actions</th></tr></thead>
          <tbody>
            ${filtered.map(p => {
              const totalStock = p.sizes ? p.sizes.reduce((sum, s) => sum + s.stock, 0) : 0;
              const statusColor = p.status === 'Published' ? 'badge-success' : p.status === 'Draft' ? 'badge-warning' : 'badge-danger';
              return `<tr>
                <td><img src="${p.images?.[0] || 'https://placehold.co/40x40'}" style="width:40px;height:40px;object-fit:cover;border-radius:6px;"></td>
                <td>${p.name}</td>
                <td>${p.sku || '-'}</td>
                <td>${p.category}</td>
                <td>₹${p.salePrice || p.price}</td>
                <td>${totalStock}</td>
                <td><span class="badge ${statusColor}">${p.status}</span></td>
                <td>${p.kitBuilder ? '<i class="fas fa-check-circle" style="color:#22c55e;"></i>' : '<i class="fas fa-times-circle" style="color:#94a3b8;"></i>'}</td>
                <td>
                  <button class="btn btn-sm btn-outline" onclick="openProductModal('${p._id}')"><i class="fas fa-edit"></i></button>
                  <button class="btn btn-sm btn-outline" onclick="deleteProduct('${p._id}')"><i class="fas fa-trash"></i></button>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      `;
    }

    async function openProductModal(id = null) {
      let product = null;
      if (id) { product = await fetch(`${API_URL}/products/${id}`).then(res => res.json()); }
      const name = product ? product.name : '';
      const sku = product ? product.sku : '';
      const category = product ? product.category : '';
      const price = product ? product.price : '';
      const salePrice = product ? product.salePrice : '';
      const description = product ? product.description : '';
      const status = product ? product.status : 'Published';
      const kitBuilder = product ? product.kitBuilder : false;
      const images = product ? product.images : [];
      const sizes = product ? product.sizes : [{size:'M', stock:0}];
      const colors = product ? (product.colors || []) : [];

      const modal = document.getElementById('modal');
      const modalContent = document.getElementById('modalContent');
      modalContent.innerHTML = `
        <button class="close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
        <h3>${id ? 'Edit Product' : 'Add Product'}</h3>
        <div class="grid-2">
          <div><label>Product Name</label><input id="prodName" value="${name}"></div>
          <div><label>SKU</label><input id="prodSKU" value="${sku}"></div>
        </div>
        <div><label>Category</label><input id="prodCat" value="${category}" list="catList"><datalist id="catList">${getLocal('falconCategories',['T-Shirts','Track Pants','Shorts','Compression','Shoes']).map(c => `<option value="${c}">`).join('')}</datalist></div>
        <div class="grid-2">
          <div><label>MRP (₹)</label><input type="number" id="prodPrice" value="${price}"></div>
          <div><label>Sale Price (₹)</label><input type="number" id="prodSalePrice" value="${salePrice || ''}" placeholder="Optional"></div>
        </div>
        <div><label>Description</label><textarea id="prodDesc" rows="3">${description}</textarea></div>
        <div><label>Status</label><select id="prodStatus">
          <option value="Published" ${status==='Published'?'selected':''}>Published</option>
          <option value="Draft" ${status==='Draft'?'selected':''}>Draft</option>
          <option value="Hidden" ${status==='Hidden'?'selected':''}>Hidden</option>
        </select></div>
        <div><label><input type="checkbox" id="prodKitBuilder" ${kitBuilder?'checked':''}> Enable in Kit Builder</label></div>
        <div><label>Colors (comma separated)</label><input id="prodColors" value="${colors.join(',')}"></div>
        <div><label>Images (first is main)</label>
          <div class="flex" id="imagePreviews">${images.map((img,i) => `<div style="position:relative"><img src="${img}" class="preview"><button onclick="removeImage(${i})" style="position:absolute;top:-5px;right:-5px;background:red;color:white;border:none;border-radius:50%;width:20px;height:20px;">×</button></div>`).join('')}</div>
          <input type="file" id="imageUpload" accept="image/*" multiple onchange="handleImageUpload(this)">
        </div>
        <div><label>Sizes & Stock</label>
          <div id="sizeContainer">
            ${sizes.map((s,i) => `
              <div class="size-row">
                <input value="${s.size}" placeholder="Size" id="size_${i}_label">
                <input type="number" value="${s.stock}" placeholder="Stock" id="size_${i}_stock">
                <button class="btn btn-sm btn-outline" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>
              </div>`).join('')}
          </div>
          <button class="btn btn-sm btn-outline" onclick="addSizeRow()"><i class="fas fa-plus"></i> Add Size</button>
        </div>
        <button class="btn btn-primary" style="margin-top:16px;" onclick="saveProduct('${id || ''}')">Save Product</button>
      `;
      modal.classList.remove('hidden');
      window.productImages = images.slice();
    }

    function handleImageUpload(input) {
      const files = input.files;
      for (let file of files) {
        compressImage(file, 800, 0.6).then(compressedData => {
          window.productImages.push(compressedData);
          updateImagePreviews();
        });
      }
    }

    function updateImagePreviews() {
      const container = document.getElementById('imagePreviews');
      if (container) {
        container.innerHTML = window.productImages.map((img,i) => `
          <div style="position:relative">
            <img src="${img}" class="preview">
            <button onclick="removeImage(${i})" style="position:absolute;top:-5px;right:-5px;background:red;color:white;border:none;border-radius:50%;width:20px;height:20px;">×</button>
          </div>`).join('');
      }
    }

    window.removeImage = function(index) { window.productImages.splice(index,1); updateImagePreviews(); };

    function addSizeRow() {
      const container = document.getElementById('sizeContainer');
      const idx = container.children.length;
      const div = document.createElement('div');
      div.className = 'size-row';
      div.innerHTML = `<input value="" placeholder="Size" id="size_${idx}_label"> <input type="number" value="0" placeholder="Stock" id="size_${idx}_stock"> <button class="btn btn-sm btn-outline" onclick="this.parentElement.remove()">×</button>`;
      container.appendChild(div);
    }

    async function saveProduct(id) {
      const name = document.getElementById('prodName').value;
      const sku = document.getElementById('prodSKU').value;
      const category = document.getElementById('prodCat').value;
      const price = parseFloat(document.getElementById('prodPrice').value);
      const salePrice = document.getElementById('prodSalePrice').value ? parseFloat(document.getElementById('prodSalePrice').value) : null;
      const status = document.getElementById('prodStatus').value;
      const kitBuilder = document.getElementById('prodKitBuilder').checked;
      const description = document.getElementById('prodDesc').value;
      const colors = document.getElementById('prodColors').value.split(',').map(c => c.trim()).filter(c => c);
      const images = window.productImages || [];
      const sizes = [];
      document.querySelectorAll('#sizeContainer .size-row').forEach(row => {
        const label = row.querySelector('input:first-child').value;
        const stock = parseInt(row.querySelector('input[type="number"]').value) || 0;
        if (label) sizes.push({ size: label, stock });
      });
      const productData = { name, sku, category, price, salePrice, status, kitBuilder, description, colors, images, sizes };
      await saveProductToDB(productData, id || null);
      closeModal();
      renderPage();
    }

    async function deleteProduct(id) { if (confirm('Delete this product?')) { await deleteProductFromDB(id); renderPage(); } }

    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    // ---------- CATEGORIES (stored in localStorage) ----------
    function renderCategories() {
      const categories = getLocal('falconCategories', ['T-Shirts','Track Pants','Shorts','Compression','Shoes']);
      contentArea.innerHTML = `
        <h2>Categories</h2>
        <button class="btn btn-primary" onclick="addCategory()"><i class="fas fa-plus"></i> Add Category</button>
        <ul style="list-style:none; margin-top:16px;">
          ${categories.map(c => `<li style="padding:12px; background:#1e293b; border-radius:8px; margin-bottom:8px; display:flex; justify-content:space-between;"><span>${c}</span><div><button class="btn btn-sm btn-outline" onclick="editCategory('${c}')">Edit</button> <button class="btn btn-sm btn-outline" onclick="deleteCategory('${c}')">Delete</button></div></li>`).join('')}
        </ul>
      `;
    }
    window.addCategory = () => {
      const name = prompt('Category name:');
      if (name) {
        const categories = getLocal('falconCategories', []);
        if (!categories.includes(name)) { categories.push(name); setLocal('falconCategories', categories); renderCategories(); }
      }
    };
    window.editCategory = (oldName) => {
      const newName = prompt('Edit category:', oldName);
      if (newName && newName !== oldName) {
        let categories = getLocal('falconCategories', []);
        const idx = categories.indexOf(oldName);
        if (idx !== -1) { categories[idx] = newName; setLocal('falconCategories', categories); renderCategories(); }
      }
    };
    window.deleteCategory = (name) => {
      if (confirm(`Delete "${name}"?`)) {
        let categories = getLocal('falconCategories', []);
        categories = categories.filter(c => c !== name);
        setLocal('falconCategories', categories);
        renderCategories();
      }
    };

    // ---------- SHOES (filtered products) ----------
    function renderShoes() { renderProducts('Shoes'); }

    // ---------- KIT BUILDER ----------
    async function renderKitBuilder() {
      const products = await fetchProducts();
      const settings = getLocal('falconKitBuilderSettings', { minProducts:3, maxProducts:5, discountPercent:10 });
      contentArea.innerHTML = `
        <h2>Kit Builder Management</h2>
        <div class="card">
          <h3>Settings</h3>
          <div class="grid-2">
            <div><label>Minimum Products</label><input type="number" id="kitMin" value="${settings.minProducts}"></div>
            <div><label>Maximum Products</label><input type="number" id="kitMax" value="${settings.maxProducts}"></div>
            <div><label>Kit Discount (%)</label><input type="number" id="kitDiscount" value="${settings.discountPercent}"></div>
          </div>
          <button class="btn btn-primary" onclick="saveKitSettings()">Save Settings</button>
        </div>
        <h3>Products in Kit Builder</h3>
        <table>
          <thead><tr><th>Product</th><th>Category</th><th>Enable</th></tr></thead>
          <tbody>
            ${products.map(p => `
              <tr>
                <td>${p.name}</td>
                <td>${p.category}</td>
                <td><input type="checkbox" ${p.kitBuilder?'checked':''} onchange="toggleKitProduct('${p._id}', this.checked)"></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }
    window.saveKitSettings = () => {
      const min = parseInt(document.getElementById('kitMin').value);
      const max = parseInt(document.getElementById('kitMax').value);
      const discount = parseInt(document.getElementById('kitDiscount').value);
      setLocal('falconKitBuilderSettings', { minProducts:min, maxProducts:max, discountPercent:discount });
      alert('Kit builder settings saved.');
    };
    window.toggleKitProduct = async (id, enabled) => {
      await fetch(`${API_URL}/products/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ kitBuilder: enabled }) });
    };

    // ---------- ORDERS ----------
    async function renderOrders() {
      const orders = await fetch(`${API_URL}/orders`).then(res => res.json()).catch(() => []);
      contentArea.innerHTML = `
        <h2>Orders</h2>
        <table>
          <thead><tr><th>Order ID</th><th>Customer</th><th>Amount</th><th>Status</th><th>Date</th><th>Action</th></tr></thead>
          <tbody>
            ${orders.map(o => `
              <tr>
                <td>#${o._id.slice(-6)}</td>
                <td>${o.shippingAddress?.fullName || 'N/A'}</td>
                <td>₹${o.grandTotal}</td>
                <td><span class="badge ${o.status==='Delivered'?'badge-success':o.status==='Cancelled'?'badge-danger':'badge-warning'}">${o.status}</span></td>
                <td>${new Date(o.createdAt).toLocaleDateString()}</td>
                <td>
                  <select onchange="updateOrderStatus('${o._id}', this.value)">
                    <option>Pending</option><option>Confirmed</option><option>Packed</option><option>Shipped</option><option>Delivered</option><option>Cancelled</option>
                  </select>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }
    window.updateOrderStatus = async (id, status) => {
      await fetch(`${API_URL}/orders/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ status }) });
      renderOrders();
    };

    // ---------- CUSTOMERS (extracted from orders) ----------
    async function renderCustomers() {
      const orders = await fetch(`${API_URL}/orders`).then(res => res.json()).catch(() => []);
      const customers = [];
      const seen = new Set();
      orders.forEach(o => {
        const addr = o.shippingAddress;
        if (addr && !seen.has(addr.phone)) {
          seen.add(addr.phone);
          customers.push({ name: addr.fullName, phone: addr.phone, email: '', orders: 1, spent: o.grandTotal });
        }
      });
      contentArea.innerHTML = `
        <h2>Customers</h2>
        <table>
          <thead><tr><th>Name</th><th>Phone</th><th>Orders</th><th>Spent</th></tr></thead>
          <tbody>
            ${customers.map(c => `<tr><td>${c.name}</td><td>${c.phone}</td><td>${c.orders}</td><td>₹${c.spent}</td></tr>`).join('')}
          </tbody>
        </table>
        ${customers.length === 0 ? '<p>No customers yet.</p>' : ''}
      `;
    }

    // ---------- COUPONS ----------
    async function renderCoupons() {
      const coupons = await fetch(`${API_URL}/coupons`).then(res => res.json()).catch(() => []);
      contentArea.innerHTML = `
        <h2>Coupons</h2>
        <button class="btn btn-primary" onclick="addCoupon()"><i class="fas fa-plus"></i> Add Coupon</button>
        <table style="margin-top:16px;">
          <thead><tr><th>Code</th><th>Discount</th><th>Expiry</th><th>Usage</th><th>Action</th></tr></thead>
          <tbody>
            ${coupons.map(c => `
              <tr>
                <td>${c.code}</td>
                <td>${c.discountPercent}%</td>
                <td>${c.expiry || 'N/A'}</td>
                <td>${c.used || 0}/${c.limit || '∞'}</td>
                <td><button class="btn btn-sm btn-outline" onclick="deleteCoupon('${c._id}')">Delete</button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }
    window.addCoupon = async () => {
      const code = prompt('Coupon code:');
      const discount = prompt('Discount %:');
      const expiry = prompt('Expiry date (YYYY-MM-DD):');
      if (code && discount) {
        await fetch(`${API_URL}/coupons`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ code, discountPercent: parseInt(discount), expiry }) });
        renderCoupons();
      }
    };
    window.deleteCoupon = async (id) => { if (confirm('Delete this coupon?')) { await fetch(`${API_URL}/coupons/${id}`, { method: 'DELETE' }); renderCoupons(); } };

    // ---------- REVIEWS ----------
    async function renderReviews() {
      const reviews = await fetch(`${API_URL}/reviews`).then(res => res.json()).catch(() => []);
      contentArea.innerHTML = `
        <h2>Reviews</h2>
        ${reviews.map(r => `
          <div class="card flex" style="justify-content:space-between">
            <div><strong>${r.name}</strong> - ${r.rating}★<br>${r.text}</div>
            <div>
              <button class="btn btn-sm btn-outline" onclick="approveReview('${r._id}', ${!r.approved})">${r.approved ? 'Reject' : 'Approve'}</button>
              <button class="btn btn-sm btn-outline" onclick="deleteReview('${r._id}')">Delete</button>
            </div>
          </div>
        `).join('')}
      `;
    }
    window.approveReview = async (id, approved) => {
      await fetch(`${API_URL}/reviews/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ approved }) });
      renderReviews();
    };
    window.deleteReview = async (id) => { if (confirm('Delete review?')) { await fetch(`${API_URL}/reviews/${id}`, { method: 'DELETE' }); renderReviews(); } };

    // ---------- WEBSITE CONTENT ----------
    function renderContent() {
      const content = getLocal('falconContent', {});
      contentArea.innerHTML = `
        <h2>Website Content</h2>
        <div><label>Hero Title</label><input id="heroTitle" value="${content.heroTitle || ''}"></div>
        <div><label>Hero Subtitle</label><input id="heroSubtitle" value="${content.heroSubtitle || ''}"></div>
        <div><label>About Text</label><textarea id="aboutText">${content.aboutText || ''}</textarea></div>
        <button class="btn btn-primary" onclick="saveContent()">Save Content</button>
      `;
    }
    window.saveContent = () => {
      const data = { heroTitle: document.getElementById('heroTitle').value, heroSubtitle: document.getElementById('heroSubtitle').value, aboutText: document.getElementById('aboutText').value };
      setLocal('falconContent', data);
      alert('Content saved!');
    };

    // ---------- MEDIA LIBRARY ----------
    function renderMedia() {
      const media = getLocal('falconMedia', []);
      contentArea.innerHTML = `
        <h2>Media Library</h2>
        <input type="file" id="mediaUpload" accept="image/*,video/*" multiple onchange="uploadMedia()">
        <div class="flex" style="flex-wrap:wrap; gap:16px; margin-top:16px;">
          ${media.map((m,i) => `<div style="position:relative"><img src="${m}" style="width:100px;height:100px;object-fit:cover;border-radius:8px;"><button onclick="deleteMedia(${i})" style="position:absolute;top:-8px;right:-8px;background:red;color:white;border:none;border-radius:50%;">×</button></div>`).join('')}
        </div>
      `;
    }
    window.uploadMedia = () => {
      const files = document.getElementById('mediaUpload').files;
      let media = getLocal('falconMedia', []);
      for (let file of files) {
        const reader = new FileReader();
        reader.onload = e => { media.push(e.target.result); setLocal('falconMedia', media); renderMedia(); };
        reader.readAsDataURL(file);
      }
    };
    window.deleteMedia = index => {
      let media = getLocal('falconMedia', []);
      media.splice(index,1);
      setLocal('falconMedia', media);
      renderMedia();
    };

    // ---------- SETTINGS ----------
    function renderSettings() {
      const settings = getLocal('falconSettings', {});
      contentArea.innerHTML = `
        <h2>Settings</h2>
        <div><label>Store Name</label><input id="storeName" value="${settings.storeName || ''}"></div>
        <div><label>Email</label><input id="email" value="${settings.email || ''}"></div>
        <div><label>Phone (landline / mobile)</label><input id="phone" value="${settings.phone || ''}" placeholder="+91 98765 43210"></div>
        <div><label>WhatsApp Number</label><input id="whatsapp" value="${settings.whatsapp || ''}" placeholder="+91 98765 43210"></div>
        <div><label>Address</label><input id="address" value="${settings.address || ''}"></div>
        <div><label>Shipping Charge</label><input type="number" id="shipping" value="${settings.shippingCharge || 0}"></div>
        <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
      `;
    }

    window.saveSettings = () => {
      const data = {
        storeName: document.getElementById('storeName').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        whatsapp: document.getElementById('whatsapp').value,
        address: document.getElementById('address').value,
        shippingCharge: parseFloat(document.getElementById('shipping').value) || 0
      };
      setLocal('falconSettings', data);
      alert(`Settings saved!\nPhone: ${data.phone || '(not set)'}\nWhatsApp: ${data.whatsapp || '(not set)'}`);
      renderSettings();
    };

    // ---------- ANALYTICS ----------
    function renderAnalytics() {
      contentArea.innerHTML = `<h2>Analytics</h2><div class="card"><canvas id="salesChart" style="max-height:400px;"></canvas></div>`;
      const ctx = document.getElementById('salesChart').getContext('2d');
      new Chart(ctx, { type:'bar', data:{ labels:['Jan','Feb','Mar','Apr'], datasets:[{ label:'Sales (₹)', data:[12000,15000,18000,20000], backgroundColor:'#ef4444' }] } });
    }

    // Initial render
    renderPage();
  </script>
</body>
</html>
